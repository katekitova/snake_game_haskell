name:                snake-game
version:             0.1.0.0
github:              "githubuser/snake-game"
license:             WTFPL
author:              "Ekaterina Kitova"
maintainer:          "example@example.com"
copyright:           "2026 Ekaterina Kitova"

extra-source-files:
- README.md

description: Please see the README on GitHub at <https://github.com/githubuser/project-template#readme>

dependencies:
- base >= 4.7 && < 5
- gloss
- directory
- random
- process


library:
  source-dirs: src
  ghc-options:
  - -Wall

executables:
  snake-game-exe:
    main:                Main.hs
    source-dirs:
      - app
      - src
    ghc-options:
    - -Wall
    - -threaded
    - -rtsopts
    - -with-rtsopts=-N
    dependencies:
    - snake-game

tests:
  snake-game-test:
    main:                Spec.hs
    source-dirs:         test
    ghc-options:
    - -threaded
    - -rtsopts
    - -with-rtsopts=-N
    dependencies:
    - snake-game
